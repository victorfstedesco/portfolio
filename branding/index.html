<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Branding — Victor Tedesco</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,300;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { fontFamily: { sans: ['Poppins', 'sans-serif'] } } }
        }
    </script>
    <style>
        body { cursor: none; overflow-x: hidden; }
        body.loading { overflow: hidden; }
        .cursor-dot, .cursor-outline {
            position: fixed; top: 0; left: 0;
            transform: translate(-50%, -50%);
            border-radius: 50%; z-index: 9999; pointer-events: none;
        }
        .cursor-dot { width: 8px; height: 8px; background-color: #111827; }
        .cursor-outline {
            width: 40px; height: 40px;
            border: 1px solid rgba(17,24,39,0.5);
            transition: width .25s cubic-bezier(.25,1,.5,1),
                        height .25s cubic-bezier(.25,1,.5,1),
                        background-color .25s cubic-bezier(.25,1,.5,1),
                        border-color .25s cubic-bezier(.25,1,.5,1);
        }
        body.hovering .cursor-outline { width:60px;height:60px;background-color:rgba(17,24,39,.1);border-color:transparent; }
        body.hovering-copy .cursor-outline,
        body.hovering-visit .cursor-outline,
        body.hovering-zoom .cursor-outline { width:90px;height:90px;background-color:#111827;border-color:transparent; }
        body.hovering-copy .cursor-text,
        body.hovering-visit .cursor-text,
        body.hovering-zoom .cursor-text { opacity:1; }
        body.hovering-view .cursor-outline { width:100px;height:100px;background-color:#111827;border-color:transparent; }
        body.hovering-view .cursor-text { opacity:1; }
        .bambo-line { height:1px;background-color:#d1d5db;margin:4rem 0;opacity:.5;width:0; }
        .reveal-wrap { overflow:hidden;display:inline-block;vertical-align:top; }
        html { scroll-behavior: auto; }
        .loader {
            position:fixed;inset:0;background:#111827;color:#fafafa;z-index:10000;
            display:flex;justify-content:center;align-items:center;
            font-size:2vw;font-weight:800;text-transform:uppercase;letter-spacing:.2em;
        }
        .footer-link { transition:color .3s ease,-webkit-text-stroke .3s ease;-webkit-text-stroke:1px transparent; }
        .footer-link:hover { color:transparent!important;-webkit-text-stroke:1.5px #111827; }
        .next-project-section { transition:background-color .5s ease; }
        #lightbox-modal { backdrop-filter:blur(8px);transition:opacity .4s ease,visibility .4s ease; }
        @media(max-width:768px){
            .loader{font-size:5vw;flex-direction:column;}
            .loader .ml-4{margin-left:0;margin-top:.5rem;}
            body{cursor:auto;}
            .cursor-dot,.cursor-outline{display:none;}
        }
    </style>
</head>
<body class="bg-[#fafafa] text-gray-900 font-sans tracking-[-0.03em] antialiased relative loading">

    <!-- Custom Cursor -->
    <div class="cursor-dot"></div>
    <div class="cursor-outline flex items-center justify-center text-center">
        <span class="cursor-text text-[10px] font-bold uppercase tracking-wider text-white opacity-0 transition-opacity duration-200 whitespace-nowrap pointer-events-none"></span>
    </div>

    <!-- Loader -->
    <div class="loader">
        <div class="reveal-wrap"><span class="loader-text block text-gray-400">identidade visual</span></div>
        <div class="reveal-wrap"><span class="loader-text block ml-4 text-white">carregando...</span></div>
    </div>

    <!-- Linhas de fundo -->
    <div class="fixed inset-0 pointer-events-none z-[-1] flex justify-center">
        <div class="w-full max-w-[1700px] h-full flex justify-between px-4 sm:px-10 opacity-40">
            <div class="w-px h-full bg-gray-300 bg-line"></div>
            <div class="w-px h-full bg-gray-300 bg-line"></div>
        </div>
    </div>

    <!-- Header -->
    <header id="header" class="max-w-[1500px] mx-auto px-4 sm:px-10 py-10 flex justify-between items-center text-xs font-semibold uppercase tracking-[0.2em] text-gray-900 bg-transparent relative z-50 transition-all duration-300">
        <div class="reveal-wrap"><a href="../" class="hover-target hover:underline underline-offset-4 decoration-1 header-item inline-block">← Voltar para o início</a></div>
        <div class="reveal-wrap"><a href="../#work" class="hover-target hover:underline underline-offset-4 decoration-1 header-item inline-block">Projetos</a></div>
    </header>

    <main class="pt-8 overflow-hidden">

        <!-- Hero -->
        <section class="max-w-[1500px] mx-auto px-4 sm:px-10 pt-12">
            <div class="reveal-wrap mb-4">
                <span class="project-tag text-xs font-semibold uppercase tracking-widest text-gray-400 block"></span>
            </div>
            <div class="reveal-wrap w-full">
                <h1 class="project-title text-[9vw] sm:text-[8vw] md:text-[6.5rem] leading-[0.9] font-black tracking-tighter text-gray-900"></h1>
            </div>
        </section>

        <!-- Ficha Técnica -->
        <div class="w-full max-w-[1700px] mx-auto px-4 sm:px-10 mt-12">
            <div class="border-t border-b border-gray-200 py-10">
                <div class="max-w-[1500px] mx-auto grid grid-cols-2 md:grid-cols-4 gap-8 text-sm">
                    <div class="meta-item">
                        <p class="text-xs uppercase text-gray-400 font-bold tracking-wider mb-2">Cliente</p>
                        <p class="font-semibold text-gray-800"></p>
                    </div>
                    <div class="meta-item">
                        <p class="text-xs uppercase text-gray-400 font-bold tracking-wider mb-2">Minha Atuação</p>
                        <p class="font-semibold text-gray-800"></p>
                    </div>
                    <div class="meta-item">
                        <p class="text-xs uppercase text-gray-400 font-bold tracking-wider mb-2">Ano</p>
                        <p class="font-semibold text-gray-800"></p>
                    </div>
                    <div class="meta-item">
                        <p class="text-xs uppercase text-gray-400 font-bold tracking-wider mb-2">Ferramentas</p>
                        <p class="font-semibold text-gray-800"></p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Behance CTA -->
        <div class="max-w-[1500px] mx-auto px-4 sm:px-10 py-8">
            <a id="behance-link" href="#" target="_blank" rel="noopener noreferrer" data-cursor="visit"
               class="hover-target inline-flex items-center gap-3 border border-gray-900 text-gray-900 text-[10px] font-bold uppercase tracking-widest px-8 py-4 hover:bg-gray-900 hover:text-white transition-colors duration-300">
                Ver case completo no Behance ↗
            </a>
        </div>

        <!-- Hero Image -->
        <section class="max-w-[1700px] mx-auto px-4 sm:px-10 pb-24">
            <div class="project-hero-image-wrap overflow-hidden bg-gray-100 w-full relative" style="padding-bottom:50%;">
                <img src="" alt="" data-cursor="zoom"
                     class="project-hero-image hover-target absolute inset-0 w-full h-full object-cover">
            </div>
        </section>

        <!-- Divisor -->
        <div class="w-full max-w-[1700px] mx-auto px-4 sm:px-10">
            <div class="bambo-line !my-0"></div>
        </div>

        <!-- PALETA (opcional) -->
        <section id="section-palette" class="max-w-[1500px] mx-auto px-4 sm:px-10 py-16">
            <h2 class="text-xs font-bold uppercase tracking-[0.2em] text-gray-400 mb-10">Paleta de Cores Institucional</h2>
            <div id="palette-grid" class="grid grid-cols-1 sm:grid-cols-3 gap-6 text-sm">
                <!-- gerado pelo JS -->
            </div>
        </section>

        <!-- CONCEITO + TÓPICOS -->
        <section class="max-w-[1500px] mx-auto px-4 sm:px-10 py-16 grid grid-cols-1 lg:grid-cols-3 gap-12 sm:gap-20">
            <div>
                <h2 id="concept-label" class="text-xs font-bold uppercase tracking-[0.2em] text-gray-400 mb-6"></h2>
                <p id="concept-text" class="text-lg text-gray-800 font-light leading-relaxed"></p>
            </div>
            <div id="topics-container" class="lg:col-span-2 flex flex-col gap-12">
                <!-- gerado pelo JS -->
            </div>
        </section>

        <!-- GALERIA (opcional) -->
        <section id="section-gallery" class="max-w-[1500px] mx-auto px-4 sm:px-10 py-12">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8 lg:gap-12">
                <div class="gallery-card flex flex-col gap-4">
                    <div class="overflow-hidden bg-[#e8e8e8] relative" style="padding-bottom:75%;">
                        <img src="" alt="" data-cursor="zoom" class="gallery-img hover-target absolute inset-0 w-full h-full object-cover">
                    </div>
                    <span class="gallery-cap text-xs uppercase text-gray-400 tracking-wider"></span>
                </div>
                <div class="gallery-card flex flex-col gap-4 md:translate-y-16">
                    <div class="overflow-hidden bg-[#e8e8e8] relative" style="padding-bottom:75%;">
                        <img src="" alt="" data-cursor="zoom" class="gallery-img hover-target absolute inset-0 w-full h-full object-cover">
                    </div>
                    <span class="gallery-cap text-xs uppercase text-gray-400 tracking-wider"></span>
                </div>
            </div>
        </section>

        <!-- MOCKUP FULL (opcional) -->
        <section id="section-mockup" class="max-w-[1500px] mx-auto px-4 sm:px-10 pt-24 pb-40">
            <div class="gallery-card flex flex-col gap-4">
                <div class="overflow-hidden bg-[#e8e8e8] relative" style="padding-bottom:45%;">
                    <img src="" alt="" data-cursor="zoom" class="mockup-image hover-target absolute inset-0 w-full h-full object-cover">
                </div>
                <span class="mockup-caption text-xs uppercase text-gray-400 tracking-wider"></span>
            </div>
        </section>

        <!-- Divisor -->
        <div class="w-full max-w-[1700px] mx-auto px-4 sm:px-10">
            <div class="bambo-line !my-0"></div>
        </div>

        <!-- Próximo Projeto -->
        <section class="next-project-section hover-target w-full bg-transparent border-b border-gray-200 py-32" data-cursor="view">
            <a id="next-project-link" href="#" class="max-w-[1500px] mx-auto px-4 sm:px-10 flex flex-col items-center text-center group">
                <span class="text-xs font-bold uppercase tracking-[0.2em] text-gray-400 group-hover:text-gray-200 transition-colors duration-500 mb-6">Próximo Projeto</span>
                <h2 id="next-project-title" class="text-[8vw] sm:text-[7vw] md:text-[6rem] leading-none font-black tracking-tighter text-gray-900 group-hover:text-white transition-colors duration-500">→</h2>
            </a>
        </section>

    </main>

    <!-- Footer -->
    <footer class="border-t border-gray-200 bg-transparent py-40 relative z-10 w-full overflow-hidden">
        <div class="max-w-[1700px] mx-auto px-4 sm:px-10 flex flex-col uppercase font-black tracking-tighter">
            <div class="reveal-wrap w-full text-center">
                <a href="mailto:victortedesco@gmail.com" data-cursor="copy" class="footer-link hover-target text-[6vw] sm:text-[5vw] md:text-[4rem] lg:text-[5.5rem] leading-[1.15] text-gray-900 inline-block w-full py-3 px-2">EMAIL</a>
            </div>
            <div class="reveal-wrap w-full text-center mt-4">
                <a href="https://www.linkedin.com/in/victor-tedesco/" target="_blank" rel="noopener noreferrer" data-cursor="visit" class="footer-link hover-target text-[6vw] sm:text-[5vw] md:text-[4rem] lg:text-[5.5rem] leading-[1.15] text-gray-900 inline-block w-full py-3 px-2">LINKEDIN</a>
            </div>
            <div class="reveal-wrap w-full text-center mt-4">
                <a href="https://www.behance.net/victorfstedesco" target="_blank" rel="noopener noreferrer" data-cursor="visit" class="footer-link hover-target text-[6vw] sm:text-[5vw] md:text-[4rem] lg:text-[5.5rem] leading-[1.15] text-gray-900 inline-block w-full py-3 px-2">BEHANCE</a>
            </div>
        </div>
    </footer>

    <!-- Lightbox -->
    <div id="lightbox-modal" class="fixed inset-0 bg-black/90 z-[10000] opacity-0 invisible flex items-center justify-center p-4 sm:p-12 hover-target" data-cursor="visit">
        <button id="lightbox-close" class="absolute top-8 right-8 text-white hover:text-gray-400 text-xs font-semibold uppercase tracking-widest transition-colors">Fechar (Esc)</button>
        <img id="lightbox-image" src="" alt="" class="max-w-full max-h-[85vh] object-contain shadow-2xl">
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script>
        // ─── CURSOR ───────────────────────────────────────────────────────────
        const cursorDot     = document.querySelector('.cursor-dot');
        const cursorOutline = document.querySelector('.cursor-outline');
        const cursorText    = document.querySelector('.cursor-text');
        const isTouchDevice = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);

        function showToast(msg) {
            let t = document.getElementById('toast-notification');
            if (!t) {
                t = document.createElement('div');
                t.id = 'toast-notification';
                t.className = 'fixed bottom-10 left-1/2 bg-gray-900 text-white text-xs font-semibold px-6 py-3 rounded-full shadow-lg z-[10000] opacity-0 pointer-events-none';
                document.body.appendChild(t);
            }
            t.textContent = msg;
            gsap.killTweensOf(t);
            gsap.fromTo(t, { xPercent:-50, y:20, opacity:0 }, { xPercent:-50, y:0, opacity:1, duration:0.4, ease:'power3.out' });
            gsap.to(t, { xPercent:-50, y:-10, opacity:0, duration:0.4, delay:2, ease:'power3.in', onComplete: () => t.remove() });
        }

        if (!isTouchDevice) {
            gsap.set(cursorOutline, { xPercent:-50, yPercent:-50 });
            window.addEventListener('mousemove', e => {
                cursorDot.style.left = `${e.clientX}px`;
                cursorDot.style.top  = `${e.clientY}px`;
                gsap.to(cursorOutline, { left:e.clientX, top:e.clientY, duration:0.15, ease:'power2.out' });
            });

            function applyHoverListeners() {
                document.querySelectorAll('.hover-target').forEach(el => {
                    el.removeEventListener('mouseenter', onEnter);
                    el.removeEventListener('mouseleave', onLeave);
                    el.addEventListener('mouseenter', onEnter);
                    el.addEventListener('mouseleave', onLeave);
                });
            }
            function onEnter(e) {
                const t = e.currentTarget.getAttribute('data-cursor');
                document.body.classList.remove('hovering','hovering-copy','hovering-visit','hovering-zoom','hovering-view');
                if (t === 'copy')  { document.body.classList.add('hovering-copy');  cursorText.textContent = 'COPIAR';    }
                else if (t === 'visit') { document.body.classList.add('hovering-visit'); cursorText.textContent = 'VISITAR ↗'; }
                else if (t === 'zoom')  { document.body.classList.add('hovering-zoom');  cursorText.textContent = 'ZOOM 🔍'; }
                else if (t === 'view')  { document.body.classList.add('hovering-view');  cursorText.textContent = 'VER ↗';    }
                else                   { document.body.classList.add('hovering'); }
            }
            function onLeave() {
                document.body.classList.remove('hovering','hovering-copy','hovering-visit','hovering-zoom','hovering-view');
                cursorText.textContent = '';
            }
            applyHoverListeners();
        }

        // Copy email
        const emailLink = document.querySelector('a[data-cursor="copy"]');
        if (emailLink) {
            emailLink.addEventListener('click', e => {
                e.preventDefault();
                navigator.clipboard.writeText('victortedesco@gmail.com').then(() => {
                    showToast('E-mail copiado!');
                    if (!isTouchDevice && cursorText) {
                        cursorText.textContent = 'COPIADO!';
                        gsap.fromTo(cursorOutline, { scale:0.8, xPercent:-50, yPercent:-50 }, { scale:1, xPercent:-50, yPercent:-50, duration:0.3, ease:'back.out(2)' });
                        setTimeout(() => { if (document.body.classList.contains('hovering-copy')) cursorText.textContent = 'COPIAR'; }, 1500);
                    }
                }).catch(() => { window.location.href = 'mailto:victortedesco@gmail.com'; });
            });
        }

        // ─── LOAD DATA ────────────────────────────────────────────────────────
        async function loadProjectAndInit() {
            const id = new URLSearchParams(window.location.search).get('id');

            try {
                const res      = await fetch('../projects.json');
                const all      = await res.json();
                const project  = all.find(p => p.id === id && p.type === 'branding');

                if (project) {
                    populateData(project, all);
                } else {
                    document.querySelector('.project-title').textContent = 'PROJETO NÃO ENCONTRADO';
                }
            } catch (err) {
                console.error('Erro ao carregar projects.json:', err);
                document.querySelector('.project-title').textContent = 'ERRO AO CARREGAR';
            }

            initGSAP();
        }

        function populateData(project, all) {
            // Título da aba
            document.title = `${project.title} — Branding (Victor Tedesco)`;

            // Loader
            const loaderTexts = document.querySelectorAll('.loader-text');
            if (loaderTexts[0]) loaderTexts[0].textContent = project.loaderLine1;
            if (loaderTexts[1]) loaderTexts[1].textContent = project.loaderLine2;

            // Hero
            document.querySelector('.project-tag').textContent  = project.tags;
            document.querySelector('.project-title').textContent = project.title;

            // Ficha técnica
            const metaFields = ['client', 'role', 'year', 'tools'];
            document.querySelectorAll('.meta-item').forEach((item, i) => {
                const val = item.querySelector('p:last-child');
                if (val && metaFields[i]) val.textContent = project.meta[metaFields[i]];
            });

            // Behance
            const bLink = document.getElementById('behance-link');
            if (bLink) bLink.href = project.behance || '#';

            // Hero image
            const heroImg = document.querySelector('.project-hero-image');
            if (heroImg) { heroImg.src = project.heroImage.src; heroImg.alt = project.heroImage.alt; }

            // Paleta (opcional)
            const palSection = document.getElementById('section-palette');
            if (palSection) {
                if (project.sections.includes('palette') && project.palette?.length) {
                    document.getElementById('palette-grid').innerHTML = project.palette.map(c => `
                        <div class="color-swatch flex flex-col gap-4">
                            <div class="h-40 w-full shadow-inner" style="background-color:${c.hex}"></div>
                            <div>
                                <p class="font-bold text-gray-900">${c.name}</p>
                                <p class="text-xs text-gray-400">${c.hex}</p>
                            </div>
                        </div>`).join('');
                } else {
                    palSection.style.display = 'none';
                }
            }

            // Conceito
            const conceptLabel = document.getElementById('concept-label');
            const conceptText  = document.getElementById('concept-text');
            if (conceptLabel) conceptLabel.textContent = project.concept?.label || '';
            if (conceptText)  conceptText.textContent  = project.concept?.text  || '';

            // Tópicos
            const topicsCont = document.getElementById('topics-container');
            if (topicsCont && project.topics?.length) {
                topicsCont.innerHTML = project.topics.map(t => `
                    <div>
                        <h3 class="text-2xl font-bold tracking-tight text-gray-900 mb-4">${t.title}</h3>
                        <p class="text-gray-600 leading-relaxed font-light">${t.text}</p>
                    </div>`).join('');
            }

            // Galeria (opcional)
            const galSection = document.getElementById('section-gallery');
            if (galSection) {
                if (project.sections.includes('gallery') && project.gallery?.length) {
                    const imgs  = galSection.querySelectorAll('.gallery-img');
                    const caps  = galSection.querySelectorAll('.gallery-cap');
                    const cards = galSection.querySelectorAll('.gallery-card');
                    project.gallery.forEach((g, i) => {
                        if (imgs[i]) { imgs[i].src = g.src; imgs[i].alt = g.alt; }
                        if (caps[i]) caps[i].textContent = g.caption;
                    });
                    for (let i = project.gallery.length; i < cards.length; i++) {
                        if (cards[i]) cards[i].style.display = 'none';
                    }
                } else {
                    galSection.style.display = 'none';
                }
            }

            // Mockup full (opcional)
            const mockSection = document.getElementById('section-mockup');
            if (mockSection) {
                if (project.sections.includes('mockupFull') && project.mockupFull) {
                    const img = mockSection.querySelector('.mockup-image');
                    const cap = mockSection.querySelector('.mockup-caption');
                    if (img) { img.src = project.mockupFull.src; img.alt = project.mockupFull.alt; }
                    if (cap) cap.textContent = project.mockupFull.caption;
                } else {
                    mockSection.style.display = 'none';
                }
            }

            // Próximo projeto
            const idx  = all.findIndex(p => p.id === project.id);
            const next = all[(idx + 1) % all.length];
            const nextLink  = document.getElementById('next-project-link');
            const nextTitle = document.getElementById('next-project-title');
            if (nextLink)  nextLink.href         = `../${next.type}/?id=${next.id}`;
            if (nextTitle) nextTitle.textContent  = `${next.title} →`;

            // Re-aplicar listeners depois do render
            if (!isTouchDevice) applyHoverListeners();
        }

        // ─── GSAP ─────────────────────────────────────────────────────────────
        function initGSAP() {
            gsap.registerPlugin(ScrollTrigger);

            const masterTl = gsap.timeline();
            masterTl
                .from('.loader-text', { y:'100%', duration:0.6, ease:'power4.out', stagger:0.1 })
                .to('.loader-text',   { y:'-100%', duration:0.4, ease:'power4.in', delay:0.4, stagger:0.05 })
                .to('.loader', { yPercent:-100, duration:0.8, ease:'expo.inOut',
                    onComplete: () => { document.body.classList.remove('loading'); ScrollTrigger.refresh(); }
                }, '-=0.2')
                .from('.bg-line',    { scaleY:0, transformOrigin:'top center', duration:1.2, ease:'power4.inOut' }, '-=0.6')
                .from('.header-item',{ y:'-100%', duration:0.8, ease:'power4.out', stagger:0.1 }, '-=0.8')
                .from('.project-tag',  { y:'130%', opacity:0, duration:0.8, ease:'power3.out' }, '-=0.8')
                .from('.project-title',{ y:'130%', rotationZ:1, duration:1, ease:'power4.out' }, '-=0.7')
                .from('.meta-item',    { y:30, opacity:0, duration:0.8, ease:'power3.out', stagger:0.08 }, '-=0.6');

            gsap.set('.project-hero-image', { scale:1.1 });
            gsap.to('.project-hero-image', {
                yPercent:12, scale:1, ease:'none',
                scrollTrigger: { trigger:'.project-hero-image-wrap', start:'top bottom', end:'bottom top', scrub:true }
            });

            gsap.utils.toArray('.bambo-line').forEach(line => {
                gsap.to(line, { width:'100%', duration:1.5, ease:'power4.inOut',
                    scrollTrigger: { trigger:line, start:'top 95%', end:'top 60%', scrub:1 }
                });
            });

            gsap.from('.color-swatch', {
                y:40, opacity:0, duration:1, ease:'power3.out', stagger:0.1,
                scrollTrigger: { trigger:'#section-palette', start:'top 85%' }
            });

            gsap.from('#concept-label, #concept-text, #topics-container > div', {
                y:40, opacity:0, duration:1, ease:'power3.out', stagger:0.1,
                scrollTrigger: { trigger:'#concept-label', start:'top 85%' }
            });

            gsap.utils.toArray('.gallery-card').forEach(card => {
                gsap.from(card, { y:50, opacity:0, duration:1.2, ease:'power3.out',
                    scrollTrigger: { trigger:card, start:'top 90%' }
                });
            });

            gsap.from('.footer-link', { y:'130%', rotation:1.5, duration:1.2, ease:'power4.out', stagger:0.15,
                scrollTrigger: { trigger:'footer', start:'top 95%' }
            });

            // Next project hover
            const nextSection = document.querySelector('.next-project-section');
            if (nextSection) {
                nextSection.addEventListener('mouseenter', () => gsap.to(nextSection, { backgroundColor:'#111827', duration:0.6, ease:'power2.out' }));
                nextSection.addEventListener('mouseleave', () => gsap.to(nextSection, { backgroundColor:'transparent', duration:0.6, ease:'power2.out' }));
            }

            // Header scroll
            const header = document.getElementById('header');
            if (header) {
                window.addEventListener('scroll', () => {
                    if (window.scrollY > 20) {
                        header.classList.add('shadow-sm','bg-[#fafafa]/90','backdrop-blur-md');
                        header.classList.replace('py-10','py-4');
                    } else {
                        header.classList.remove('shadow-sm','bg-[#fafafa]/90','backdrop-blur-md');
                        header.classList.replace('py-4','py-10');
                    }
                });
            }

            // Lightbox
            const lightboxModal = document.getElementById('lightbox-modal');
            const lightboxImage = document.getElementById('lightbox-image');
            document.querySelectorAll('img[data-cursor="zoom"]').forEach(img => {
                img.addEventListener('click', () => {
                    lightboxImage.src = img.src;
                    lightboxModal.classList.remove('invisible');
                    gsap.to(lightboxModal, { opacity:1, duration:0.4, ease:'power2.out' });
                    document.body.classList.add('loading');
                });
            });
            function closeLightbox() {
                if (lightboxModal && !lightboxModal.classList.contains('invisible')) {
                    gsap.to(lightboxModal, { opacity:0, duration:0.3, ease:'power2.in',
                        onComplete: () => { lightboxModal.classList.add('invisible'); lightboxImage.src = ''; document.body.classList.remove('loading'); }
                    });
                }
            }
            if (lightboxModal) {
                lightboxModal.addEventListener('click', e => { if (e.target !== lightboxImage) closeLightbox(); });
                document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });
            }

            window.addEventListener('load', () => ScrollTrigger.refresh());
        }

        // ─── START ────────────────────────────────────────────────────────────
        loadProjectAndInit();
    </script>
</body>
</html>
