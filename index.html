<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Portfólio Minimalista</title>
    <!-- Fontes do Google (Poppins) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,300;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet">
    
    <!-- Carregando Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Poppins', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        /* Estilos base */
        body {
            cursor: none; /* Hide default cursor for custom cursor */
            overflow-x: hidden;
        }

        /* Custom Cursor */
        .cursor-dot, .cursor-outline {
            position: fixed;
            top: 0;
            left: 0;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            z-index: 9999;
            pointer-events: none;
        }
        .cursor-dot {
            width: 8px;
            height: 8px;
            background-color: #111827;
        }
        .cursor-outline {
            width: 40px;
            height: 40px;
            border: 1px solid rgba(17, 24, 39, 0.5);
            transition: width 0.2s, height 0.2s, background-color 0.2s;
        }
        
        /* Cursor Hover States */
        body.hovering .cursor-outline {
            width: 60px;
            height: 60px;
            background-color: rgba(17, 24, 39, 0.1);
            border-color: transparent;
        }

        /* Estilo para a linha separadora horizontal */
        .bambo-line {
            height: 1px;
            background-color: #d1d5db;
            margin: 4rem 0;
            opacity: 0.5;
            width: 0; /* Initial state for GSAP */
        }

        /* Utility for GSAP text reveals */
        .reveal-wrap {
            overflow: hidden;
            display: inline-block;
            vertical-align: top;
        }
        
        /* Smooth scrolling via CSS */
        html {
            scroll-behavior: auto;
        }
        
        /* Loader - Storytelling Opening */
        .loader {
            position: fixed;
            inset: 0;
            background: #111827;
            color: #fafafa;
            z-index: 10000;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2vw;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.2em;
        }
        
        @media (max-width: 768px) {
            .loader {
                font-size: 5vw;
                flex-direction: column;
            }
            .loader .ml-4 {
                margin-left: 0;
                margin-top: 0.5rem;
            }
            body {
                cursor: auto;
            }
            .cursor-dot, .cursor-outline {
                display: none;
            }
        }
    </style>
</head>

    <!-- GSAP Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    
    <script>
        // Custom Cursor Logic
        const cursorDot = document.querySelector('.cursor-dot');
        const cursorOutline = document.querySelector('.cursor-outline');
        const hoverTargets = document.querySelectorAll('.hover-target');

        // Check if device is touch
        const isTouchDevice = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);

        if (!isTouchDevice) {
            window.addEventListener('mousemove', (e) => {
                const posX = e.clientX;
                const posY = e.clientY;

                // Dot follows exactly
                cursorDot.style.left = `${posX}px`;
                cursorDot.style.top = `${posY}px`;

                // Outline follows with slight delay using GSAP
                gsap.to(cursorOutline, {
                    left: posX,
                    top: posY,
                    duration: 0.15,
                    ease: "power2.out"
                });
            });

            hoverTargets.forEach(target => {
                target.addEventListener('mouseenter', () => {
                    document.body.classList.add('hovering');
                });
                target.addEventListener('mouseleave', () => {
                    document.body.classList.remove('hovering');
                });
            });
        }

        // Initialize GSAP
        gsap.registerPlugin(ScrollTrigger);

        // Storytelling Animation Sequence
        const masterTl = gsap.timeline();

        // 1. Loader & Intro Sequence (The "Deconstructing Ideas" Story)
        masterTl
            // Reveal loader text
            .from('.loader-text', {
                y: '100%',
                duration: 1,
                ease: 'power4.out',
                stagger: 0.2
            })
            // Hold for a moment to let user read
            .to('.loader-text', {
                y: '-100%',
                duration: 0.8,
                ease: 'power4.in',
                delay: 0.8,
                stagger: 0.1
            })
            // Slide loader up and out of the way
            .to('.loader', {
                yPercent: -100,
                duration: 1.2,
                ease: 'expo.inOut'
            }, "-=0.4")
            // Reveal background solid lines (growing from top)
            .from('.bg-line', {
                scaleY: 0,
                transformOrigin: 'top center',
                duration: 1.5,
                ease: 'power4.inOut'
            }, "-=0.8")
            // Header items drop down
            .from('.header-item', {
                y: '-100%',
                duration: 1,
                ease: 'power4.out',
                stagger: 0.1
            }, "-=1")
            // Hero Title reveal (sliding up from a mask, like a curtain rising)
            .from('.hero-title', {
                y: '100%',
                rotationZ: 1.5,
                duration: 1.5,
                ease: 'power4.out',
                stagger: 0.2
            }, "-=1")
            // Hero Subtitle reveal ("Crafting digital narratives")
            .from('.hero-subtitle', {
                y: '100%',
                opacity: 0,
                duration: 1,
                ease: 'power4.out'
            }, "-=1.2")
            // Vector Image spins and scales in perfectly in the middle
            .to('.hero-image', {
                opacity: 1,
                scale: 1,
                rotation: 360,
                duration: 2,
                ease: 'power3.out'
            }, "-=1.5");
        
        // Initial state for hero image so it doesn't show before animation
        gsap.set('.hero-image', { scale: 0, rotation: -180 });

        // 2. Parallax Hero Image on scroll
        gsap.to('.hero-image', {
            y: 150,
            rotation: 450,
            ease: "none",
            scrollTrigger: {
                trigger: "main",
                start: "top top",
                end: "bottom top",
                scrub: true
            }
        });

        // 3. Line Separator Animation (Drawing the line as we scroll)
        gsap.utils.toArray('.bambo-line').forEach(line => {
            gsap.to(line, {
                width: '100%',
                duration: 1.5,
                ease: "power4.inOut",
                scrollTrigger: {
                    trigger: line,
                    start: "top 95%",
                    end: "top 60%",
                    scrub: 1
                }
            });
        });

        // 4. "The Chaos to Order" Word Wall Story
        // Initial state: skills are scattered and chaotic
        gsap.set('.word-item', { 
            opacity: 0, 
            z: -500,
            y: () => gsap.utils.random(-150, 150),
            x: () => gsap.utils.random(-150, 150),
            rotation: () => gsap.utils.random(-45, 45)
        });

        // Final state: skills snap into place forming the professional structure
        gsap.to('.word-item', {
            opacity: 1,
            z: 0,
            y: 0,
            x: 0,
            rotation: 0,
            duration: 1.5,
            ease: "back.out(1.5)",
            stagger: 0.05,
            scrollTrigger: {
                trigger: ".word-wall",
                start: "top 80%",
            }
        });

        // 5. Projects Reveal (The Masterpieces)
        const projects = gsap.utils.toArray('.project-card');
        projects.forEach((project, i) => {
            // Setup clipping path for dynamic wipe reveal
            gsap.set(project, { clipPath: 'polygon(0 100%, 100% 100%, 100% 100%, 0 100%)' });
            
            let tl = gsap.timeline({
                scrollTrigger: {
                    trigger: project,
                    start: "top 85%",
                }
            });

            // Wipe up effect
            tl.to(project, {
                clipPath: 'polygon(0 0%, 100% 0%, 100% 100%, 0 100%)',
                duration: 1.2,
                ease: "power4.inOut"
            })
            // Internal content parallax slide up
            .from(project.querySelector('.project-inner'), {
                scale: 1.15,
                y: 30,
                duration: 1.5,
                ease: "power3.out"
            }, "-=1")
            // Typography slide up reveal
            .from(project.querySelectorAll('.card-title'), {
                y: '100%',
                duration: 0.8,
                ease: "power3.out",
                stagger: 0.1
            }, "-=1");
        });

        // 6. Footer Links Reveal
        gsap.from('.footer-link', {
            y: '110%',
            rotation: 1.5,
            duration: 1.2,
            ease: "power4.out",
            stagger: 0.15,
            scrollTrigger: {
                trigger: "footer",
                start: "top 70%",
            }
        });

        // Header subtle style on scroll (Glassmorphism effect)
        const header = document.getElementById('header');
        if (header) {
            window.addEventListener('scroll', () => {
                if (window.scrollY > 20) {
                    header.classList.add('shadow-sm', 'bg-[#fafafa]/90', 'backdrop-blur-md');
                    header.classList.replace('py-10', 'py-4');
                } else {
                    header.classList.remove('shadow-sm', 'bg-[#fafafa]/90', 'backdrop-blur-md');
                    header.classList.replace('py-4', 'py-10');
                }
            });
        }
    </script>
