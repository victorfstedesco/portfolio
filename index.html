<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Portfólio Minimalista</title>
    <!-- Fontes do Google (Poppins) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,300;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet">
    
    <!-- Carregando Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Poppins', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        /* Estilos base */
        body {
            cursor: none; /* Hide default cursor for custom cursor */
            overflow-x: hidden;
        }
        body.loading {
            overflow: hidden;
        }

        /* Custom Cursor */
        .cursor-dot, .cursor-outline {
            position: fixed;
            top: 0;
            left: 0;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            z-index: 9999;
            pointer-events: none;
        }
        .cursor-dot {
            width: 8px;
            height: 8px;
            background-color: #111827;
        }
        .cursor-outline {
            width: 40px;
            height: 40px;
            border: 1px solid rgba(17, 24, 39, 0.5);
            transition: width 0.25s cubic-bezier(0.25, 1, 0.5, 1), 
                        height 0.25s cubic-bezier(0.25, 1, 0.5, 1), 
                        background-color 0.25s cubic-bezier(0.25, 1, 0.5, 1),
                        border-color 0.25s cubic-bezier(0.25, 1, 0.5, 1);
        }
        
        /* Cursor Hover States */
        body.hovering .cursor-outline {
            width: 60px;
            height: 60px;
            background-color: rgba(17, 24, 39, 0.1);
            border-color: transparent;
        }

        body.hovering-copy .cursor-outline {
            width: 90px;
            height: 90px;
            background-color: #111827;
            border-color: transparent;
        }
        body.hovering-copy .cursor-text {
            opacity: 1;
        }

        body.hovering-visit .cursor-outline {
            width: 90px;
            height: 90px;
            background-color: #111827;
            border-color: transparent;
        }
        body.hovering-visit .cursor-text {
            opacity: 1;
        }

        body.hovering-view .cursor-outline {
            width: 100px;
            height: 100px;
            background-color: #111827;
            border-color: transparent;
        }
        body.hovering-view .cursor-text {
            opacity: 1;
        }

        /* Footer Links Style */
        .footer-link {
            transition: color 0.3s ease, -webkit-text-stroke 0.3s ease;
            -webkit-text-stroke: 1px transparent;
        }
        .footer-link:hover {
            color: transparent !important;
            -webkit-text-stroke: 1.5px #111827;
        }

        /* Estilo para a linha separadora horizontal */
        .bambo-line {
            height: 1px;
            background-color: #d1d5db;
            margin: 4rem 0;
            opacity: 0.5;
            width: 0; /* Initial state for GSAP */
        }

        /* Utility for GSAP text reveals */
        .reveal-wrap {
            overflow: hidden;
            display: inline-block;
            vertical-align: top;
        }
        
        /* Smooth scrolling via CSS */
        html {
            scroll-behavior: auto;
        }
        
        .loader {
            position: fixed;
            inset: 0;
            background: #111827;
            color: #fafafa;
            z-index: 10000;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2vw;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.2em;
        }
        .loader-text {
            transform: translateY(100%);
        }
        
        /* Word Wall Premium Focus Hover Effect */
        .word-item {
            transition: opacity 0.25s ease, color 0.25s ease;
        }
        .word-wall:hover .word-item {
            opacity: 0.45;
        }
        .word-wall .word-item:hover {
            opacity: 1;
        }
        
        @media (max-width: 768px) {
            .loader {
                font-size: 5vw;
                flex-direction: column;
            }
            .loader .ml-4 {
                margin-left: 0;
                margin-top: 0.5rem;
            }
            body {
                cursor: auto;
            }
            .cursor-dot, .cursor-outline {
                display: none;
            }
        }
    </style>
</head>
<body class="bg-[#fafafa] text-gray-900 font-sans tracking-[-0.03em] antialiased relative loading">

    <!-- GSAP Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    
    <script>
        // Custom Cursor Logic
        const cursorDot = document.querySelector('.cursor-dot');
        const cursorOutline = document.querySelector('.cursor-outline');
        const cursorText = document.querySelector('.cursor-text');

        // Check if device is touch
        const isTouchDevice = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);

        // Toast notification system
        function showToast(message) {
            let toast = document.getElementById('toast-notification');
            if (!toast) {
                toast = document.createElement('div');
                toast.id = 'toast-notification';
                toast.className = 'fixed bottom-10 left-1/2 bg-gray-900 text-white text-xs font-semibold px-6 py-3 rounded-full shadow-lg z-[10000] opacity-0 pointer-events-none';
                document.body.appendChild(toast);
            }
            toast.textContent = message;
            
            // Slide up & fade in
            gsap.killTweensOf(toast);
            gsap.fromTo(toast, 
                { xPercent: -50, y: 20, opacity: 0 }, 
                { xPercent: -50, y: 0, opacity: 1, duration: 0.4, ease: "power3.out" }
            );
            
            // Fade out after 2 seconds
            gsap.to(toast, {
                xPercent: -50,
                y: -10,
                opacity: 0,
                duration: 0.4,
                delay: 2,
                ease: "power3.in",
                onComplete: () => {
                    toast.remove();
                }
            });
        }

        if (!isTouchDevice) {
            gsap.set(cursorOutline, { xPercent: -50, yPercent: -50 });

            window.addEventListener('mousemove', (e) => {
                cursorDot.style.left = `${e.clientX}px`;
                cursorDot.style.top  = `${e.clientY}px`;
                gsap.to(cursorOutline, { left: e.clientX, top: e.clientY, duration: 0.15, ease: "power2.out" });
            });

            // Event delegation — funciona para cards gerados dinamicamente
            document.addEventListener('mouseover', (e) => {
                const target = e.target.closest('.hover-target');
                if (!target) return;
                const cursorType = target.getAttribute('data-cursor');
                document.body.classList.remove('hovering', 'hovering-copy', 'hovering-visit', 'hovering-view');
                if (cursorType === 'copy')       { document.body.classList.add('hovering-copy');  cursorText.textContent = 'COPIAR';    }
                else if (cursorType === 'visit') { document.body.classList.add('hovering-visit'); cursorText.textContent = 'VISITAR ↗'; }
                else if (cursorType === 'view')  { document.body.classList.add('hovering-view');  cursorText.textContent = 'VER ↗';    }
                else                            { document.body.classList.add('hovering'); }
            });
            document.addEventListener('mouseout', (e) => {
                if (!e.target.closest('.hover-target')) return;
                document.body.classList.remove('hovering', 'hovering-copy', 'hovering-visit', 'hovering-view');
                cursorText.textContent = '';
            });
        }

        // Copy Email to Clipboard with elegant feedback
        const emailLink = document.querySelector('a[data-cursor="copy"]');
        if (emailLink) {
            emailLink.addEventListener('click', (e) => {
                e.preventDefault();
                const email = 'victortedesco@gmail.com';
                navigator.clipboard.writeText(email).then(() => {
                    showToast('E-mail copiado para a área de transferência!');
                    if (!isTouchDevice && cursorText) {
                        cursorText.textContent = 'COPIADO!';
                        gsap.fromTo(cursorOutline, 
                            { scale: 0.8, xPercent: -50, yPercent: -50 }, 
                            { scale: 1, xPercent: -50, yPercent: -50, duration: 0.3, ease: "back.out(2)" }
                        );
                        setTimeout(() => {
                            if (document.body.classList.contains('hovering-copy')) {
                                cursorText.textContent = 'COPIAR';
                            }
                        }, 1500);
                    }
                }).catch(err => {
                    console.error('Erro ao copiar e-mail: ', err);
                    window.location.href = `mailto:${email}`;
                });
            });
        }

        // ─── RENDERIZA CARDS DO JSON ──────────────────────────────────────────
        const COL_CLASSES = [
            'flex flex-col gap-6 md:gap-8 lg:gap-10 lg:-translate-y-12',
            'flex flex-col gap-6 md:gap-8 lg:gap-10 lg:translate-y-8 mt-6 md:mt-0',
            'flex flex-col gap-6 md:gap-8 lg:gap-10 lg:-translate-y-4 mt-6 md:mt-0'
        ];

        function createCard(project) {
            const a = document.createElement('a');
            a.href = `${project.type}/?id=${project.id}`;
            a.setAttribute('data-cursor', 'view');
            a.className = 'project-card hover-target group relative overflow-hidden block';
            a.style.paddingBottom = project.card.aspect;
            a.style.backgroundColor = project.card.bgColor;

            const thumbHTML = project.card.thumb
                ? `<img src="${project.card.thumb}" alt="${project.title}"
                        class="absolute inset-0 w-full h-full object-cover opacity-80
                               group-hover:scale-110 transition-transform duration-700 ease-out">`
                : '';

            const typeLabel = project.type === 'branding' ? 'Branding'
                            : project.type === 'product'  ? 'Produto Digital'
                            : 'Landing Page';

            a.innerHTML = `
                <div class="project-inner absolute inset-0 flex flex-col justify-end p-8">
                    ${thumbHTML}
                    <div class="relative z-10">
                        <span class="block text-[10px] font-bold uppercase tracking-widest text-white/70 mb-1 mix-blend-difference">${typeLabel}</span>
                        <div class="reveal-wrap block">
                            <h3 class="card-title text-white text-4xl lg:text-5xl font-bold tracking-tighter mix-blend-difference">${project.title}</h3>
                        </div>
                    </div>
                </div>`;
            return a;
        }

        async function renderProjects() {
            try {
                const res      = await fetch('projects.json');
                const projects = await res.json();
                const grid     = document.getElementById('projects-grid');

                const cols = COL_CLASSES.map(cls => {
                    const div = document.createElement('div');
                    div.className = cls;
                    return div;
                });

                projects.forEach((project, i) => {
                    cols[i % 3].appendChild(createCard(project));
                });

                cols.forEach(col => grid.appendChild(col));
            } catch (err) {
                console.error('Erro ao carregar projects.json:', err);
            }

            initGSAP(); // Inicializa GSAP depois dos cards estarem no DOM
        }

        // ─── GSAP ─────────────────────────────────────────────────────────────
        function initGSAP() {

        // Initialize GSAP
        gsap.registerPlugin(ScrollTrigger);

        // Check if loading via transition
        const isTransition = sessionStorage.getItem('pageTransition') === 'true';
        sessionStorage.removeItem('pageTransition');

        // Storytelling Animation Sequence
        const masterTl = gsap.timeline();

        if (isTransition) {
            masterTl
                .fromTo('.loader-text', { y: '100%' }, {
                    y: '0%',
                    duration: 0.4,
                    ease: 'power3.out',
                    stagger: 0.05
                })
                .to('.loader-text', {
                    y: '-100%',
                    duration: 0.3,
                    ease: 'power3.in',
                    delay: 0.5,
                    stagger: 0.03
                })
                .to('.loader', {
                    yPercent: -100,
                    duration: 0.8,
                    ease: 'expo.inOut',
                    onComplete: () => {
                        document.body.classList.remove('loading');
                        ScrollTrigger.refresh();
                    }
                }, "-=0.2");
        } else {
            // 1. Loader & Intro Sequence (The "Deconstructing Ideas" Story)
            masterTl
                // Reveal loader text
                .fromTo('.loader-text', { y: '100%' }, {
                    y: '0%',
                    duration: 0.6,
                    ease: 'power4.out',
                    stagger: 0.1
                })
                // Hold for a moment to let user read
                .to('.loader-text', {
                    y: '-100%',
                    duration: 0.4,
                    ease: 'power4.in',
                    delay: 0.4,
                    stagger: 0.05
                })
                // Slide loader up and out of the way
                .to('.loader', {
                    yPercent: -100,
                    duration: 0.8,
                    ease: 'expo.inOut',
                    onComplete: () => {
                        document.body.classList.remove('loading');
                        ScrollTrigger.refresh();
                    }
                }, "-=0.2");
        }
            // Reveal background solid lines (growing from top)
            masterTl.from('.bg-line', {
                scaleY: 0,
                transformOrigin: 'top center',
                duration: 1.2,
                ease: 'power4.inOut'
            }, "-=0.6")
            // Header items drop down
            .from('.header-item', {
                y: '-100%',
                duration: 0.8,
                ease: 'power4.out',
                stagger: 0.1
            }, "-=0.8")
            // Hero Title reveal (sliding up from a mask, like a curtain rising)
            .from('.hero-title', {
                y: '130%',
                rotationZ: 1.5,
                duration: 1.2,
                ease: 'power4.out',
                stagger: 0.15
            }, "-=0.8")
            // Hero Subtitle reveal ("Crafting digital narratives")
            .from('.hero-subtitle', {
                y: '130%',
                opacity: 0,
                duration: 0.8,
                ease: 'power4.out'
            }, "-=0.9")
            // Vector Image spins and scales in perfectly in the middle
            .to('.hero-image', {
                opacity: 1,
                scale: 1,
                rotation: 360,
                duration: 2,
                ease: 'power3.out'
            }, "-=1.5");
        
        // Initial state for hero image so it doesn't show before animation
        gsap.set('.hero-image', { scale: 0, rotation: -180 });

        // 2. Parallax Hero Image on scroll
        gsap.to('.hero-image', {
            y: 150,
            ease: "none",
            scrollTrigger: {
                trigger: "main",
                start: "top top",
                end: "bottom top",
                scrub: true
            }
        });

        // 3. Line Separator Animation (Drawing the line as we scroll)
        gsap.utils.toArray('.bambo-line').forEach(line => {
            gsap.to(line, {
                width: '100%',
                duration: 1.5,
                ease: "power4.inOut",
                scrollTrigger: {
                    trigger: line,
                    start: "top 95%",
                    end: "top 60%",
                    scrub: 1
                }
            });
        });

        // 4. Elegant Focus/Reveal Word Wall
        // Initial state: elegant blur and slight scale/translate down
        gsap.set('.word-item', { 
            opacity: 0, 
            y: 40,
            scale: 0.9,
            filter: "blur(12px)"
        });

        // Final state: smooth fade-in and focus
        gsap.to('.word-item', {
            opacity: 1,
            y: 0,
            scale: 1,
            filter: "blur(0px)",
            duration: 1.2,
            ease: "power3.out",
            stagger: 0.04,
            clearProps: "opacity,filter,transform",
            scrollTrigger: {
                trigger: ".word-wall",
                start: "top 80%",
            }
        });

        // 5. Projects Reveal (The Masterpieces)
        const projects = gsap.utils.toArray('.project-card');
        projects.forEach((project, i) => {
            // Setup clipping path for dynamic wipe reveal
            gsap.set(project, { clipPath: 'polygon(0 100%, 100% 100%, 100% 100%, 0 100%)' });
            
            let tl = gsap.timeline({
                scrollTrigger: {
                    trigger: project,
                    start: "top 85%",
                }
            });

            // Wipe up effect
            tl.to(project, {
                clipPath: 'polygon(0 0%, 100% 0%, 100% 100%, 0 100%)',
                duration: 1.2,
                ease: "power4.inOut"
            })
            // Internal content parallax slide up
            .from(project.querySelector('.project-inner'), {
                scale: 1.15,
                y: 30,
                duration: 1.5,
                ease: "power3.out"
            }, "-=1")
            // Typography slide up reveal
            .from(project.querySelectorAll('.card-title'), {
                y: '100%',
                duration: 0.8,
                ease: "power3.out",
                stagger: 0.1
            }, "-=1");
        });

        // 6. Footer Links Reveal
        gsap.from('.footer-link', {
            y: '130%',
            rotation: 1.5,
            duration: 1.2,
            ease: "power4.out",
            stagger: 0.15,
            scrollTrigger: {
                trigger: "footer",
                start: "top 95%",
            }
        });

        // Window load refresh
        window.addEventListener('load', () => {
            ScrollTrigger.refresh();
        });

        // Header style on scroll
        const header = document.getElementById('header');
        if (header) {
            window.addEventListener('scroll', () => {
                if (window.scrollY > 20) {
                    header.classList.add('shadow-sm', 'bg-[#fafafa]/90', 'backdrop-blur-md');
                    header.classList.replace('py-10', 'py-4');
                } else {
                    header.classList.remove('shadow-sm', 'bg-[#fafafa]/90', 'backdrop-blur-md');
                    header.classList.replace('py-4', 'py-10');
                }
            });
        }

        } // ── fim initGSAP ──

        // Intercepta navegação para transição fluida
        document.addEventListener('click', (e) => {
            const anchor = e.target.closest('a');
            if (!anchor) return;
            
            const href = anchor.getAttribute('href');
            const target = anchor.getAttribute('target');
            
            if (!href || 
                href.startsWith('#') || 
                href.startsWith('mailto:') || 
                href.startsWith('tel:') || 
                target === '_blank' ||
                e.metaKey || e.ctrlKey || e.shiftKey) {
                return;
            }
            
            const isSameDomain = href.startsWith('/') || href.startsWith('.') || !href.includes('://') || href.startsWith(window.location.origin);
            if (!isSameDomain) return;

            e.preventDefault();
            
            sessionStorage.setItem('pageTransition', 'true');
            document.body.classList.add('loading');
            
            gsap.set('.loader-text', { opacity: 0 });
            gsap.set('.loader', { yPercent: 100 });
            gsap.to('.loader', {
                yPercent: 0,
                duration: 0.8,
                ease: 'expo.inOut',
                onComplete: () => {
                    window.location.href = href;
                }
            });
        });

        // Reseta o estado do loader se o usuário voltar/avançar no histórico do navegador (bfcache)
        window.addEventListener('pageshow', (event) => {
            if (event.persisted) {
                document.body.classList.remove('loading');
                gsap.set('.loader', { yPercent: -100 });
            }
        });

        // ─── START ────────────────────────────────────────────────────────────
        renderProjects();
    </script>
</body>
</html>
