<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Portfólio Minimalista</title>
    <!-- Fontes do Google (Poppins) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,300;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet">
    
    <!-- Carregando Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Poppins', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        /* Estilo para a linha separadora horizontal */
        .bambo-line {
            height: 1px;
            background-color: #d1d5db; /* Cor sólida, sem gradiente que apaga as pontas */
            margin: 4rem 0;
            opacity: 0.5;
        }
    </style>
</head>
<body class="bg-[#fafafa] text-gray-900 font-sans tracking-[-0.03em] antialiased relative">

    <!-- Fundo com Linhas Verticais Contornando (Sólidas) -->
    <div class="fixed inset-0 pointer-events-none z-[-1] flex justify-center">
        <div class="w-full max-w-[1700px] h-full flex justify-between px-4 sm:px-10 opacity-40">
            <div class="w-px h-full bg-gray-300"></div>
            <div class="w-px h-full bg-gray-300"></div>
        </div>
    </div>

    <!-- Header Fixo com Contato (Seguindo o Esboço) -->
    <!-- Header Minimalista (Estilo Referência Rafaela Kreutz) -->
    <header class="w-full max-w-[1700px] mx-auto px-4 sm:px-10 py-10 flex justify-between items-center text-xs font-semibold uppercase tracking-[0.2em] text-gray-900 bg-transparent relative z-50">
        <a href="#work" class="hover:underline underline-offset-4 decoration-1">Work</a>
        <a href="#about" class="hover:underline underline-offset-4 decoration-1 hidden sm:block">About</a>
        <span>Brazil&reg;</span>
    </header>

    <!-- Seção de Apresentação Hero -->
    <main class="pt-8 pb-20 overflow-hidden">
        <!-- Hero: Nome -->
        <section class="max-w-[1700px] mx-auto px-4 sm:px-10 relative min-h-[85vh] flex flex-col justify-center items-center">
            <div class="flex justify-center items-start md:pl-40 flex-col w-full">
                <div class="flex justify-center items-center">
                    <h1 class="text-[10vw] leading-[0.8] font-bold tracking-tighter text-gray-900 whitespace-nowrap lg:-ml-4">
                        Victor
                    </h1>
                    <img class="w-40 h-40 md:w-60 md:h-60" src="image 2 [Vectorized].svg" alt="">
                </div>
                <h1 class="text-[10vw] md:pl-40 leading-[0.8] font-bold tracking-tighter text-gray-900 whitespace-nowrap lg:-ml-4">
                    Tedesco
                </h1>
            </div>
        </section>

        <!-- Container Limitador das linhas conectadas -->
        <div class="w-full max-w-[1700px] mx-auto px-4 sm:px-10 my-20">
            <div class="bambo-line !my-0"></div>
        </div>
        
        <!-- Section: Mural de Palavras (Typography Specimen Wall) -->
        <section class="max-w-[1700px] mx-auto px-4 sm:px-10 relative min-h-[85vh] flex flex-col justify-center items-center">
            <div class="w-full max-w-[1500px]">
                <div class="flex flex-wrap justify-center items-center gap-x-6 gap-y-2 md:gap-x-10 md:gap-y-4 uppercase text-[6vw] sm:text-[5vw] md:text-[4rem] lg:text-[5.5rem] leading-[0.9] font-black tracking-tighter w-full text-center">
                        <span class="text-gray-400/50 hover:blur-none hover:text-gray-900 transition-all duration-300 cursor-crosshair select-none">UX/UI DESIGNER</span>
                        <span class="text-gray-400/50 hover:blur-none hover:text-gray-900 transition-all duration-300 cursor-crosshair select-none">FRONT-END DEV</span>
                        <span class="text-gray-400/50 hover:blur-none hover:text-gray-900 transition-all duration-300 cursor-crosshair select-none">ART DIRECTION</span>
                        <span class="text-gray-400/50 hover:blur-none hover:text-gray-900 transition-all duration-300 cursor-crosshair select-none">PROTOTYPING</span>
                        <span class="text-gray-400/50 hover:blur-none hover:text-gray-900 transition-all duration-300 cursor-crosshair select-none">DESIGN SYSTEMS</span>
                        <span class="text-gray-400/50 hover:blur-none hover:text-gray-900 transition-all duration-300 cursor-crosshair select-none">FIGMA & ADOBE</span>
                        <span class="text-gray-400/50 hover:blur-none hover:text-gray-900 transition-all duration-300 cursor-crosshair select-none">TAILWIND CSS</span>
                        <span class="text-gray-400/50 hover:blur-none hover:text-gray-900 transition-all duration-300 cursor-crosshair select-none">REACT / NEXT.JS</span>
                        <span class="text-gray-400/50 hover:blur-none hover:text-gray-900 transition-all duration-300 cursor-crosshair select-none">CREATIVE CODE</span>
                        <span class="text-gray-400/50 hover:blur-none hover:text-gray-900 transition-all duration-300 cursor-crosshair select-none">WEBFLOW & FRAMER</span>
                    </div>
                </div>
            </section>
            
        </main>

        <!-- Container Limitador das linhas conectadas -->
        <div class="w-full max-w-[1700px] mx-auto px-4 sm:px-10 my-20">
            <div class="bambo-line !my-0"></div>
        </div>

        <!-- Grid de Projetos Baseado no Print -->
        <section class="max-w-[1500px] mx-auto px-6 pt-24 pb-40">
            <!-- Grid disruptivo e desalinhado verticalmente -->
            <!-- Usando colunas e deslocando (translate-y) as colunas impares/pares para causar o desnível -->
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 md:gap-8 lg:gap-10">
                
                <!-- Coluna 1 (sobe um pouco na visão Desktop) -->
                <div class="flex flex-col gap-6 md:gap-8 lg:gap-10 lg:-translate-y-12 transition-transform duration-500">
                    <!-- Card 1 -->
                    <article class="bg-[#f0f0f0] group cursor-pointer relative overflow-hidden" style="padding-bottom: 120%;">
                        <div class="absolute inset-0 p-8 flex flex-col justify-end">
                            <img src="https://images.unsplash.com/photo-1498050108023-c5249f4df085?ixlib=rb-4.0.3&auto=format&fit=crop&w=400&q=80" alt="App Código" class="absolute inset-0 w-full h-full object-cover opacity-80 mix-blend-multiply group-hover:scale-110 transition-transform duration-700 ease-out">
                            <h3 class="text-black text-4xl lg:text-5xl font-bold tracking-tighter mix-blend-difference z-10">APTR</h3>
                        </div>
                    </article>

                    <!-- Card 4 -->
                    <article class="bg-[#f0c3f5] group cursor-pointer relative overflow-hidden" style="padding-bottom: 100%;">
                        <div class="absolute inset-0 flex items-center justify-center p-8">
                            <h3 class="text-black text-6xl md:text-7xl font-black mix-blend-overlay tracking-tighter opacity-80 group-hover:scale-110 transition-transform duration-700">FABRICA</h3>
                        </div>
                    </article>
                </div>

                <!-- Coluna 2 (desce um pouco para criar o desnível em relação à Coluna 1) -->
                <div class="flex flex-col gap-6 md:gap-8 lg:gap-10 lg:translate-y-8 transition-transform duration-500">
                    <!-- Card 2 (Shoulder) -->
                    <article class="bg-[#dcdcdc] group cursor-pointer relative overflow-hidden" style="padding-bottom: 140%;">
                        <div class="absolute inset-0">
                            <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80" alt="Shoulder" class="w-full h-full object-cover grayscale opacity-90 group-hover:grayscale-0 transition-all duration-700">
                            <div class="absolute inset-0 flex flex-col items-center justify-center p-8 bg-black/10">
                                <h3 class="text-white text-3xl font-medium tracking-tight">shoulder</h3>
                                <p class="text-white/70 text-[10px] uppercase tracking-widest mt-2">Editorial</p>
                            </div>
                        </div>
                    </article>

                    <!-- Card 5 (CAJU) -->
                    <article class="bg-gray-100 group cursor-pointer relative overflow-hidden" style="padding-bottom: 90%;">
                        <div class="absolute inset-0 flex items-end justify-center pb-8 p-12">
                            <div class="w-full h-[60%] bg-yellow-400 rounded-t-[100px] shadow-xl translate-y-1/2 group-hover:translate-y-0 transition-transform duration-700"></div>
                            <h3 class="absolute inset-x-0 bottom-4 text-center text-5xl font-serif italic text-gray-800 z-10 group-hover:-translate-y-4 transition-transform duration-500">CAJU</h3>
                        </div>
                    </article>
                </div>

                <!-- Coluna 3 (sobe para acompanhar o ziguezague) -->
                <div class="flex flex-col gap-6 md:gap-8 lg:gap-10 lg:-translate-y-4 transition-transform duration-500 mt-6 md:mt-0">
                    <!-- Card 3 (Ilustração Animal) -->
                    <article class="bg-[#fdf9e6] group cursor-pointer relative flex items-center justify-center overflow-hidden" style="padding-bottom: 80%;">
                        <div class="absolute inset-0 flex items-center justify-center p-8">
                           <img src="https://images.unsplash.com/photo-1549471013-3364d7ceeaee?ixlib=rb-4.0.3&auto=format&fit=crop&w=400&q=80" alt="Animal" class="object-contain w-3/4 mix-blend-multiply opacity-50 group-hover:scale-110 transition-transform duration-700">
                        </div>
                    </article>

                    <!-- Card 6 (Macbook voador) -->
                    <article class="bg-[#78bdf1] group cursor-pointer relative overflow-hidden" style="padding-bottom: 130%;">
                        <div class="absolute inset-0 flex items-center justify-center p-8">
                             <img src="https://images.unsplash.com/photo-1517336714731-489689fd1ca8?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80" alt="Macbook" class="object-contain w-full drop-shadow-2xl group-hover:scale-110 group-hover:rotate-2 transition-all duration-700">
                        </div>
                    </article>
                </div>

            </div>
        </section>
    </main>

    <!-- Footer Brutalista -->
    <footer class="border-t border-gray-300 bg-transparent py-40 relative z-10 w-full overflow-hidden">
        <div class="max-w-[1700px] mx-auto px-4 sm:px-10 flex flex-col uppercase font-black tracking-tighter">
            <a href="mailto:victortedesco@gmail.com" class="text-[6vw] sm:text-[5vw] md:text-[4rem] lg:text-[5.5rem] leading-[0.9] text-gray-900 hover:text-transparent hover:text-stroke-2 hover:stroke-gray-900 transition-all duration-300 text-center w-full" style="-webkit-text-stroke: 1px transparent; hover:-webkit-text-stroke: 2px #111827;">
                EMAIL
            </a>
            <a href="#" class="text-[6vw] sm:text-[5vw] md:text-[4rem] lg:text-[5.5rem] leading-[0.9] text-gray-900 hover:text-transparent hover:text-stroke-2 hover:stroke-gray-900 transition-all duration-300 text-center w-full mt-4" style="-webkit-text-stroke: 1px transparent; hover:-webkit-text-stroke: 2px #111827;">
                LINKEDIN
            </a>
            <a href="#" class="text-[6vw] sm:text-[5vw] md:text-[4rem] lg:text-[5.5rem] leading-[0.9] text-gray-900 hover:text-transparent hover:text-stroke-2 hover:stroke-gray-900 transition-all duration-300 text-center w-full mt-4" style="-webkit-text-stroke: 1px transparent; hover:-webkit-text-stroke: 2px #111827;">
                BEHANCE
            </a>
        </div>
    </footer>

    <script>
        // Efeito sutil no header durante o scroll
        // (removi o trecho sobre o ano do footer, pois não há mais o ID 'year')
        const header = document.getElementById('header');
        if (header) {
            window.addEventListener('scroll', () => {
                if (window.scrollY > 20) {
                    header.classList.add('shadow-sm');
                    header.classList.replace('py-4', 'py-3');
                } else {
                    header.classList.remove('shadow-sm');
                    header.classList.replace('py-3', 'py-4');
                }
            });
        }
    </script>
</body>
</html>
